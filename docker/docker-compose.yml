version: '3.9'

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: mockprepai
      POSTGRES_PASSWORD: mockprepai
      POSTGRES_DB: mockprepai
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    environment:
      DATABASE_URL: postgres://mockprepai:mockprepai@postgres:5432/mockprepai
      NODE_ENV: development
    ports:
      - '3000:3000'
    depends_on:
      - postgres

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  postgres_data:

